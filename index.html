<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No me hables</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            height: 100%;
            scroll-behavior: smooth;
            font-family: 'Arial', sans-serif;
            background-color: #000;
            color: white;
        }
        section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .boton {
            margin-top: 20px;
            padding: 15px 30px;
            background-color: #ff4757;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.2rem;
        }
        img {
            max-width: 90%;
            max-height: 70vh;
            border-radius: 15px;
            border: 2px solid white;
            margin-top: 20px;
        }
        #foto { background-color: #111; }
    </style>
</head>
<body>

    <section>
        <h1>no me hables hoy</h1>
        <a href="#foto" class="boton">¿porque?</a>
    </section>

    <section id="foto">
        <h2>Por esto...</h2>
        <img src="Snapchat-1644124452.jpg" alt="Explicación">
        <br>
        <a href="#" style="color: #666; text-decoration: none; margin-top: 10px;">Volver</a>
    </section>

</body>
</html>
